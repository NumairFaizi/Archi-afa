                      <div className="h-52 relative overflow-hidden">
                        <img src={p.img} alt={p.title} className="w-full h-full object-cover" />
                        <span className="absolute top-3 left-3 bg-zinc-950/90 text-[#c2a278] text-[9px] font-bold uppercase tracking-widest px-2.5 py-1 rounded border border-[#c2a278]/20">
                          {p.category}
                        </span>
                      </div>
                      <div className="p-5 flex-1 flex flex-col justify-between">
                        <div>
                          <h3 className="text-lg font-bold text-white mb-2">{p.title}</h3>
                          <p className="text-zinc-400 text-xs font-light">{p.tagline}</p>
                        </div>
                        <div className="mt-4 pt-3 border-t border-zinc-850 flex justify-between text-xs text-zinc-500 font-mono">
                          <span>{p.location}</span>
                          <span className="text-[#c2a278] font-bold">{p.scale}</span>
                        </div>
                      </div>
                    </div>
                  ))}
                </div>
              </section>
            )}

            {activeTab === 'estimator' && (
              <section className="py-16 px-6 max-w-4xl mx-auto">
                <div className="text-center mb-12">
                  <span className="text-xs uppercase tracking-[0.3em] text-[#c2a278] block mb-2 font-bold">Cost Calculator</span>
                  <h1 className="text-3xl sm:text-5xl font-extralight text-white uppercase font-serif">FEE <span className="font-semibold">ESTIMATOR</span></h1>
                </div>

                <div className="grid grid-cols-1 md:grid-cols-12 gap-6">
                  <div className="md:col-span-7 bg-zinc-900/40 border border-zinc-850 p-6 rounded-xl space-y-5 text-xs">
                    <div>
                      <label className="text-zinc-400 uppercase font-bold block mb-2">Build Type</label>
                      <select value={estType} onChange={(e) => setEstType(e.target.value)} className="w-full bg-zinc-950 border border-zinc-800 rounded p-3 text-white">
                        <option value="residential">Residential Villa / Home</option>
                        <option value="commercial">Commercial Hub / Office</option>
                        <option value="exclusive">Exclusive Project</option>
                        <option value="industrial">Industrial Facility</option>
                      </select>
                    </div>

                    <div>
                      <label className="text-zinc-400 uppercase font-bold block mb-2">Service Intensity</label>
                      <div className="grid grid-cols-3 gap-2">
                        {['consultancy', 'interior', 'turnkey'].map(s => (
                          <button key={s} onClick={() => setEstScope(s)} className={`p-2.5 rounded border text-center font-bold uppercase ${estScope === s ? 'bg-[#c2a278] text-zinc-950 border-[#c2a278]' : 'bg-zinc-950 text-zinc-400 border-zinc-800'}`}>
                            {s}
                          </button>
                        ))}
                      </div>
                    </div>

                    <div>
                      <div className="flex justify-between mb-2">
                        <label className="text-zinc-400 uppercase font-bold">Floor Area Size</label>
                        <span className="text-[#c2a278] font-bold font-mono">{estSize.toLocaleString()} SQFT</span>
                      </div>
                      <input type="range" min="500" max="50000" step="500" value={estSize} onChange={(e) => setEstSize(parseInt(e.target.value))} className="w-full h-1 bg-zinc-950 rounded cursor-pointer accent-[#c2a278]" />
                    </div>
                  </div>

                  <div className="md:col-span-5 bg-gradient-to-b from-zinc-900 to-zinc-950 border border-zinc-800 p-6 rounded-xl space-y-4">
                    <span className="text-[10px] uppercase tracking-widest text-[#c2a278] font-bold block">Summary</span>
                    <div>
                      <span className="text-zinc-500 text-[10px] uppercase block">Base Rate</span>
                      <div className="text-lg font-bold text-white font-mono">₹{estData.rate} / sq. ft.</div>
                    </div>
                    <div className="border-t border-zinc-800 pt-3">
                      <span className="text-zinc-500 text-[10px] uppercase block">Est. Cost</span>
                      <div className="text-2xl font-extrabold text-[#c2a278] font-mono">₹{estData.totalCost.toLocaleString()}</div>
                    </div>
                    <div className="border-t border-zinc-800 pt-3">
                      <span className="text-zinc-500 text-[10px] uppercase block">Timeline</span>
                      <div className="text-lg font-bold text-white font-mono">{estData.months} Months</div>
                    </div>
                  </div>
                </div>
              </section>
            )}

            {/* ABOUT US & OFFICES TAB */}
            {activeTab === 'about' && (
              <div className="py-16 px-6 max-w-7xl mx-auto space-y-20">
                
                {/* 1. About Story */}
                <section className="text-center max-w-3xl mx-auto">
                  <span className="text-xs uppercase tracking-[0.3em] text-[#c2a278] font-bold block mb-3">About Our Practice</span>
                  <h1 className="text-3xl sm:text-5xl font-extralight text-white uppercase font-serif">
                    AFA & <span className="font-semibold">TEAM</span>
                  </h1>
                  <p className="text-zinc-400 mt-6 text-sm font-light leading-relaxed">
                    AFA & Team is an Architecture and Interior design consultancy firm that brings sensitivity to the design of top restaurants, hotels, offices, and homes around the world. We design spaces that engage people and allow them to discover new things—beneath, above, and around them.
                  </p>
                  <div className="mt-8 p-6 bg-zinc-900/50 border border-zinc-800 rounded-2xl">
                    <span className="text-xs text-[#c2a278] font-bold uppercase tracking-widest block mb-2">Our Motto</span>
                    <h3 className="text-lg font-serif italic text-white">"A Natural Aptitude Towards The Arts"</h3>
                  </div>
                </section>

                {/* 2. Team Members */}
                <section>
                  <div className="text-center max-w-2xl mx-auto mb-12">
                    <span className="text-xs uppercase tracking-[0.3em] text-[#c2a278] font-bold block mb-2">Key Personnel</span>
                    <h2 className="text-2xl sm:text-4xl font-light text-white uppercase font-serif">OUR <span className="font-semibold">TEAM</span></h2>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                    {TEAM_MEMBERS.map((m, idx) => (
                      <div key={idx} className="bg-zinc-900/40 border border-zinc-850 rounded-xl p-6 text-center">
                        <div className="w-16 h-16 bg-[#c2a278]/10 text-[#c2a278] border border-[#c2a278]/30 rounded-full flex items-center justify-center text-xl font-bold mx-auto mb-4 font-serif">
                          {m.initials}
                        </div>
                        <h3 className="text-base font-bold text-white">{m.name}</h3>
                        <span className="text-[10px] uppercase tracking-widest text-[#c2a278] font-bold block mb-3">{m.role}</span>
                        <p className="text-zinc-400 text-xs font-light leading-relaxed">{m.desc}</p>
                      </div>
                    ))}
                  </div>
                </section>

                {/* 3. Offices */}
                <section>
                  <div className="text-center max-w-2xl mx-auto mb-12">
                    <span className="text-xs uppercase tracking-[0.3em] text-[#c2a278] font-bold block mb-2">Global Presence</span>
                    <h2 className="text-2xl sm:text-4xl font-light text-white uppercase font-serif">OUR <span className="font-semibold">OFFICES</span></h2>
                  </div>

                  <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                    {OFFICES.map((off, idx) => (
                      <div key={idx} className="p-6 bg-zinc-900/50 border border-zinc-850 rounded-2xl relative overflow-hidden flex flex-col justify-between">
                        <div>
                          <span className="text-[10px] uppercase tracking-widest text-[#c2a278] font-bold block mb-1">{off.tag}</span>
                          <h3 className="text-xl font-bold text-white mb-3">{off.title}</h3>
                          <p className="text-zinc-400 text-xs leading-relaxed font-light mb-6">{off.address}</p>
                        </div>
                        <div className="pt-4 border-t border-zinc-800 text-xs text-[#c2a278] font-mono space-y-1">
                          {off.phones && off.phones.map((p, i) => <div key={i}>📞 {p}</div>)}
                          {off.status && <div className="inline-block bg-[#c2a278]/10 text-[#c2a278] border border-[#c2a278]/30 px-3 py-1 rounded text-[10px] font-bold uppercase tracking-widest">{off.status}</div>}
                          <div>✉ {off.email}</div>
                        </div>
                      </div>
                    ))}
                  </div>
                </section>

              </div>
            )}

            {/* CONTACT TAB */}
            {activeTab === 'contact' && (
              <section className="py-16 px-6 max-w-6xl mx-auto">
                <div className="text-center max-w-3xl mx-auto mb-12">
                  <span className="text-xs uppercase tracking-[0.3em] text-[#c2a278] block mb-2 font-bold">Connect</span>
                  <h1 className="text-3xl sm:text-5xl font-extralight text-white uppercase font-serif">GET IN <span className="font-semibold">TOUCH</span></h1>
                </div>

                <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                  <div className="lg:col-span-5 space-y-4">
                    {OFFICES.map((off, idx) => (
                      <div key={idx} className="p-5 bg-zinc-900/40 border border-zinc-850 rounded-xl text-xs">
                        <h3 className="font-bold text-white mb-1">{off.title}</h3>
                        <p className="text-zinc-400 mb-2 font-light">{off.address}</p>
                        <div className="text-[#c2a278] font-mono space-y-1">
                          {off.phones && off.phones.map((p, i) => <div key={i}>📞 {p}</div>)}
                          <div>✉ {off.email}</div>
                        </div>
                      </div>
                    ))}
                  </div>

                  <div className="lg:col-span-7 bg-zinc-900/20 border border-zinc-850 p-6 rounded-2xl">
                    {formSubmitted ? (
                      <div className="text-center py-12 text-emerald-400 font-bold text-sm">✓ Inquiry Logged Successfully!</div>
                    ) : (
                      <form onSubmit={handleFormSubmit} className="space-y-4 text-xs">
                        <div>
                          <label className="text-zinc-400 uppercase font-bold block mb-1">Name</label>
                          <input type="text" required value={formState.name} onChange={(e) => setFormState({ ...formState, name: e.target.value })} className="w-full bg-zinc-950 border border-zinc-800 rounded p-3 text-white" />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="text-zinc-400 uppercase font-bold block mb-1">Email</label>
                            <input type="email" required value={formState.email} onChange={(e) => setFormState({ ...formState, email: e.target.value })} className="w-full bg-zinc-950 border border-zinc-800 rounded p-3 text-white" />
                          </div>
                          <div>
                            <label className="text-zinc-400 uppercase font-bold block mb-1">Phone</label>
                            <input type="tel" required value={formState.phone} onChange={(e) => setFormState({ ...formState, phone: e.target.value })} className="w-full bg-zinc-950 border border-zinc-800 rounded p-3 text-white" />
                          </div>
                        </div>
                        <button type="submit" className="w-full bg-[#c2a278] hover:bg-[#b08e63] text-zinc-950 font-bold py-3.5 rounded uppercase tracking-widest">
                          Submit Request
                        </button>
                      </form>
                    )}
                  </div>
                </div>
              </section>
            )}
          </main>

          {/* AI CHAT CONCIERGE WIDGET */}
          <div className="fixed bottom-6 right-6 z-50">
            {!chatOpen ? (
              <button 
                onClick={() => setChatOpen(true)}
                className="bg-[#c2a278] text-zinc-950 p-4 rounded-full shadow-2xl hover:scale-105 transition-all flex items-center space-x-2 font-bold text-xs uppercase tracking-wider"
              >
                <span>💬 AFA AI Assistant</span>
              </button>
            ) : (
              <div className="bg-zinc-900 border border-zinc-800 rounded-2xl w-[320px] sm:w-[380px] h-[480px] shadow-2xl flex flex-col justify-between overflow-hidden">
                <div className="bg-zinc-950 px-5 py-4 border-b border-zinc-800 flex justify-between items-center">
                  <div>
                    <h4 className="text-xs font-bold text-white uppercase tracking-wider">AFA AI Representative</h4>
                    <span className="text-[9px] text-[#c2a278]">archi-athar.com</span>
                  </div>
                  <button onClick={() => setChatOpen(false)} className="text-zinc-400 hover:text-white">✕</button>
                </div>

                <div className="flex-1 overflow-y-auto p-4 space-y-3">
                  {chatMessages.map((m, idx) => (
                    <div key={idx} className={`flex ${m.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`p-3 rounded-xl max-w-[85%] text-xs leading-relaxed ${m.role === 'user' ? 'bg-[#c2a278] text-zinc-950 font-semibold' : 'bg-zinc-950 text-zinc-300 border border-zinc-800'}`}>
                        {m.text}
                      </div>
                    </div>
                  ))}
                  {chatLoading && (
                    <div className="text-[10px] text-zinc-500 font-mono animate-pulse">AFA AI is typing...</div>
                  )}
                  <div ref={chatEndRef} />
                </div>

                <form onSubmit={handleSendMessage} className="p-3 bg-zinc-950 border-t border-zinc-800 flex items-center space-x-2">
                  <input 
                    type="text" 
                    value={chatInput} 
                    onChange={(e) => setChatInput(e.target.value)}
                    placeholder="Ask about our services or offices..."
                    className="flex-1 bg-zinc-900 border border-zinc-800 rounded-lg px-3 py-2 text-xs text-white focus:outline-none focus:border-[#c2a278]"
                  />
                  <button type="submit" className="bg-[#c2a278] text-zinc-950 font-bold px-3 py-2 rounded-lg text-xs">Send</button>
                </form>
              </div>
            )}
          </div>

          {/* FOOTER */}
          <footer className="bg-zinc-900 border-t border-zinc-800 py-8 px-6 text-center text-xs text-zinc-500 font-mono">
            <div className="max-w-7xl mx-auto flex flex-col sm:flex-row justify-between items-center gap-4">
              <div><strong className="text-zinc-300">AFA & TEAM</strong> | Archi Athar</div>
              <div>Copyright © 2026 AFA & Team. All rights reserved. | archi-athar.com</div>
            </div>
          </footer>

        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
